id: slider
label: Slider
family: family-c-forms
category: Form
intent: Select a value within a range
description: Range slider input
composable: true
capabilities: Value, Disabled
required_parts: ["SliderTrack", "SliderThumb"]
optional_parts: ["SliderRange"]
tags: ["slider", "range", "interval", "volume", "value", "drag"]
keywords: 
pain: Sliders allow invalid values and break accessibility attributes
promise: Value clamped and ARIA attributes enforced automatically
why: |
  SliderPrimitive clamps value within min/max and maps percent and aria-valuenow. Track and thumb are structurally defined. This guarantees consistent interaction behavior.
rules: ["CR-001", "CR-004"]
use_cases: ["volume control", "range selection"]
related: ["select", "combobox", "radio", "radio_group", "color_picker"]
file: slider_ui.css
tokens: slider-*, size-*, radius-*, motion-*
foundation: size, radius, motion, interaction
states: ["active", "disabled"]
island: slider_island.rs
pillar: select
badges: ["SSR Safe", "Hydration Safe", "Token Driven", "Deterministic API", "Zero Drift", "Island Architecture"]
before: |
  // ❌ Typical
  view! {
    <input type="range" value="200" />
  }
after: |
  // ✅ CanonRS
  view! {
    <Slider min=0.0 max=100.0 value=50.0 />
  }
boundary_type: interaction
ix_group: ix_gesture
