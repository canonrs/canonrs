id: copy-button
label: Copy Button
family: family-f-data
category: Action
intent: Copy text to clipboard on click
description: Clipboard copy button
composable: false
capabilities: 
required_parts: []
optional_parts: []
tags: ["copy-button", "copy", "clipboard", "button", "action"]
