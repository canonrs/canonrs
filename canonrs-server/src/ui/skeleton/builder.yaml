states: ["loading"]
island: skeleton_island.rs
pillar: progress
badges: ["SSR Safe", "Hydration Safe", "Token Driven", "Deterministic API", "Zero Drift"]
before: |
  // ❌ Typical
  view! {
    <div class="skeleton"></div>
  }
after: |
  // ✅ CanonRS
  view! {
    <Skeleton variant=SkeletonVariant::Text />
  }
island_type: passthrough
