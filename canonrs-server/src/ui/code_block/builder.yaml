id: code-block
label: Code Block
family: family-f-data
category: Display
intent: Display syntax-highlighted code
description: Syntax-highlighted code display
composable: false
capabilities: 
required_parts: []
optional_parts: []
tags: ["code-block", "code", "syntax", "highlight", "snippet", "technical"]
keywords: 
pain: Code blocks rely on client-side highlighting causing hydration mismatch
promise: SSR-safe syntax highlighting with deterministic DOM output
why: |
  CodeBlockPrimitive supports SSR-safe rendering with precomputed HTML. The contract ensures no client mutation is required. This prevents hydration mismatch and ensures consistent output.
rules: ["CR-001", "CR-004"]
use_cases: ["docs", "code snippets"]
related: ["avatar", "icon", "logo", "markdown", "chart", "stat", "inline_meta", "kbd", "badge", "carousel"]
file: code_block_ui.css
tokens: code-block-*, space-*, radius-*, font-*
foundation: spacing, radius, typography
states: ["copied"]
island: code_block_island.rs
pillar: content_display
badges: ["SSR Safe", "Hydration Safe", "Token Driven", "Deterministic API", "Zero Drift"]
before: |
  // ❌ Typical
  view! {
    <pre><code>{highlight(code)}</code></pre>
  }
after: |
  // ✅ CanonRS
  view! {
    <CodeBlock code="fn main() {}" language="rust" />
  }
